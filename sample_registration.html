<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* ✅ FIXED SCROLL ISSUE */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 0;
    overflow-y: auto;
}

.container {
    width: 420px;
    background: #fff;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.form-group {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
    color: #555;
    margin-bottom: 5px;
    display: block;
}

input, select {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 5px rgba(102,126,234,0.4);
}

/* ✅ FIXED CHECKBOX ISSUE */
.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
}

.checkbox-group input {
    width: auto;
    transform: scale(1.1);
}

.error {
    color: #ff4d4f;
    font-size: 11px;
    margin-top: 3px;
}

.btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

#continueBtn {
    background: #ffa502;
    margin-top: 10px;
}

#continueBtn:hover {
    background: #e69500;
}

#registerBtn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin-top: 10px;
}

#registerBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.divider {
    text-align: center;
    margin: 15px 0;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <form id="registrationForm">

        <div class="form-group">
            <label>Name *</label>
            <input type="text" id="name">
            <span id="nameError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email">
            <span id="emailError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Organization *</label>
            <input type="text" id="orgName">
            <span id="orgError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Password *</label>
            <input type="password" id="password">
            <span id="passwordError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Confirm Password *</label>
            <input type="password" id="confirmPassword">
            <span id="confirmPasswordError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Country *</label>
            <select id="country">
                <option value="">Select Country</option>
                <option>India</option>
                <option>USA</option>
                <option>UK</option>
            </select>
            <span id="countryError" class="error"></span>
        </div>

        <div class="form-group">
            <label>State *</label>
            <input type="text" id="state">
            <span id="stateError" class="error"></span>
        </div>

        <div class="form-group">
            <label>Phone Number *</label>
            <input type="text" id="phone">
            <span id="phoneError" class="error"></span>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="signupText">
            <label for="signupText">Receive updates & offers</label>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">I agree to Terms & Conditions *</label>
        </div>
        <span id="termsError" class="error"></span>

        <button type="button" class="btn" id="continueBtn">Continue</button>

        <div class="divider">or</div>

        <button type="submit" class="btn" id="registerBtn">Register</button>

    </form>
</div>
<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent actual form submission to keep errors visible for Playwright

        // Reset all errors first
        const errorSpans = document.querySelectorAll('.error');
        errorSpans.forEach(span => span.textContent = "");

        let isValid = true;

        // 1. Name Validation
        const name = document.getElementById('name').value;
        if (!name) {
            document.getElementById('nameError').textContent = "Name is required";
            isValid = false;
        }

        // 2. Email Validation
        const email = document.getElementById('email').value;
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) {
            document.getElementById('emailError').textContent = "Email is required";
            isValid = false;
        } else if (!emailPattern.test(email)) {
            document.getElementById('emailError').textContent = "Invalid email format";
            isValid = false;
        }

        // 3. Organization Validation
        if (!document.getElementById('orgName').value) {
            document.getElementById('orgError').textContent = "Organization is required";
            isValid = false;
        }

        // 4. Password Validation
        const password = document.getElementById('password').value;
        if (!password) {
            document.getElementById('passwordError').textContent = "Password is required";
            isValid = false;
        }

        // 5. Password Mismatch (The one you saw earlier!)
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (!confirmPassword) {
            document.getElementById('confirmPasswordError').textContent = "Please confirm your password";
            isValid = false;
        } else if (password !== confirmPassword) {
            document.getElementById('confirmPasswordError').textContent = "Passwords do not match";
            isValid = false;
        }

        // 6. Country Selection
        if (!document.getElementById('country').value) {
            document.getElementById('countryError').textContent = "Please select a country";
            isValid = false;
        }

        // 7. Terms & Conditions
        if (!document.getElementById('terms').checked) {
            document.getElementById('termsError').textContent = "You must agree to the terms";
            isValid = false;
        }

        if (isValid) {
            alert("Registration Successful!");
            // In a real app, you would submit the form here
        }
    });
</script>

</body>
</html>
